# 工作流名称，可自定义
name: Build and Deploy mdBook to GitHub Pages

# 触发条件：向 main 分支推送代码时触发（若主分支是 master 则改为 master）
on:
  push:
    branches: [ master ]
  # 可选：允许手动触发工作流
  workflow_dispatch:

# 工作流任务
jobs:
  deploy:
    # 运行环境：Ubuntu 最新版
    runs-on: ubuntu-latest
    steps:
      # 步骤 1：拉取仓库代码到 GitHub 虚拟服务器
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整提交历史（mdBook 构建可能需要）

      # 步骤 2：安装 Rust 环境（mdBook 基于 Rust 开发）
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # 步骤 3：安装 mdBook 工具
      - name: Install mdBook
        run: cargo install mdbook

      # 步骤 4：（可选）安装 mdBook 插件（如果你的项目用到了插件，比如 mdbook-toc）
      # 示例：安装目录插件 mdbook-toc
      # - name: Install mdBook plugins
      #   run: cargo install mdbook-toc

      # 步骤 5：构建 mdBook 静态文件（生成到 book/ 目录）
      - name: Build mdBook
        run: mdbook build

      # 步骤 6：部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          # GitHub 自动生成的令牌，无需手动配置
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # mdBook 构建后的输出目录（固定为 ./book）
          publish_dir: ./book
          # 部署到 gh-pages 分支（GitHub Pages 默认读取该分支）
          publish_branch: gh-pages
          # 可选：清除旧的部署文件，保持分支干净
          force_orphan: true
